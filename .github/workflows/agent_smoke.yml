# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      run_eda_smoke:
        description: "Install Verilator/Yosys and run EDA smoke test"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Test with pytest
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        pip install -e . --no-deps
        pip install pytest
        rtl-agent --help
        pytest -vv -s tests/test_terminal_approval_flow.py

    - name: Install EDA tools (optional)
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_eda_smoke }}
      run: |
        sudo apt-get update
        sudo apt-get install -y verilator yosys
        verilator --version
        yosys -V

    - name: Run Verilator smoke testcase (optional)
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_eda_smoke }}
      run: |
        cat > ci_smoke.sv <<'EOF'
        module ci_smoke;
          initial begin
            $display("CI Verilator smoke test");
            $finish;
          end
        endmodule
        EOF
        verilator --binary -o ci_smoke ci_smoke.sv
        ./obj_dir/ci_smoke
