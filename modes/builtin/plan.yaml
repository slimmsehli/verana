name: "plan"
description: "Decompose a task into an ordered action plan"
system_prompt_suffix: "Generate an execution plan before doing implementation."
preferred_skills:
  - "verification_plan"
use_planner: true
plan_approval: true
react_loop:
  max_iterations: 8
  show_thought: true
  show_action: true
  show_observation: true
  abort_on_error: false
  iteration_warning: 4
  output_format: "markdown"
